services:
  svnadmin:
    build:
      context: .
      dockerfile: Dockerfile.optimized
    container_name: svnadmin-local-optimized
    command:
      - /bin/sh
      - -c
      - |
        sed -i 's/\r$//' /root/start.sh /root/hook_manager.sh /root/db_auto_init.sh
        if grep -q 'dav_svn_module' /etc/httpd/conf.d/subversion.conf 2>/dev/null; then rm -f /etc/httpd/conf.d/00-svn-modules.conf; fi
        mkdir -p /home/svnadmin/rep /home/svnadmin/backup /home/svnadmin/crond /home/svnadmin/temp /home/svnadmin/logs /home/svnadmin/hooks /home/svnadmin/sasl/ldap /home/svnadmin/templete/initStruct/01/trunk /home/svnadmin/templete/initStruct/01/branches /home/svnadmin/templete/initStruct/01/tags /home/svnadmin/templete/pid
        touch /home/svnadmin/svnserve /home/svnadmin/svnserve.pid /home/svnadmin/svnserve.conf /home/svnadmin/authz /home/svnadmin/passwd /home/svnadmin/httpPasswd /home/svnadmin/logs/svnserve.log /home/svnadmin/sasl/ldap/saslauthd.conf
        sed -i 's/\r$//' /home/svnadmin/authz /home/svnadmin/passwd /home/svnadmin/svnserve.conf 2>/dev/null || true
        chmod -R 777 /home/svnadmin/rep /home/svnadmin/backup /home/svnadmin/crond /home/svnadmin/temp /home/svnadmin/logs /home/svnadmin/hooks /home/svnadmin/sasl /home/svnadmin/templete
        chmod 666 /home/svnadmin/svnserve /home/svnadmin/svnserve.pid /home/svnadmin/svnserve.conf /home/svnadmin/authz /home/svnadmin/passwd /home/svnadmin/httpPasswd /home/svnadmin/logs/svnserve.log /home/svnadmin/sasl/ldap/saslauthd.conf
        (
          while true; do
            pid="$(pgrep -x svnserve | head -n 1 || true)"
            if [ -n "$$pid" ]; then
              current=""
              if [ -f /home/svnadmin/svnserve.pid ]; then current="$(cat /home/svnadmin/svnserve.pid 2>/dev/null || true)"; fi
              if [ "$$current" != "$$pid" ]; then echo "$$pid" > /home/svnadmin/svnserve.pid; fi
              chmod 666 /home/svnadmin/svnserve.pid 2>/dev/null || true
            else
              rm -f /home/svnadmin/svnserve.pid
            fi
            sleep 2
          done
        ) &
        exec /root/start.sh
    ports:
      - "8080:80"
      - "3690:3690"
    volumes:
      # SVN数据持久化
      - ./data:/home/svnadmin
      # 日志文件持久化
      - ./logs:/var/www/html/logs
      # Apache配置文件（可选）
      - ./config/httpd.conf:/etc/httpd/conf.d/svnadmin.conf:ro
      # SASL配置（可选）
      - ./config/sasl2:/etc/sasl2:ro
    environment:
      - TZ=Asia/Shanghai
      # 企业微信配置环境变量（可选）
      - WECOM_CORP_ID=${WECOM_CORP_ID:-}
      - WECOM_CORP_SECRET=${WECOM_CORP_SECRET:-}
      - WECOM_AGENT_ID=${WECOM_AGENT_ID:-}
    restart: unless-stopped
    networks:
      - svnadmin-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  svnadmin-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
